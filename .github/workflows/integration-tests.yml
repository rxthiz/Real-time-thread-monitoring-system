name: Integration Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  alert-pipeline-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: threat_monitor_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d threat_monitor_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5433/threat_monitor_test
      TEST_REDIS_URL: redis://localhost:6380/0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run alert pipeline integration test
        run: pytest tests/test_alert_pipeline_integration.py -q
